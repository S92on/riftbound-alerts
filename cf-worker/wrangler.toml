name = "riftbound-bot"
main = "src/index.ts"
compatibility_date = "2024-11-01"
compatibility_flags = ["nodejs_compat"]

# Cron triggers (UTC). Asia/Bangkok = UTC+7.
#  every 30 min  : refresh Magical Meta summary
#  hourly at :15 : check watchlists
#  daily 02:00   : 09:00 Bangkok daily digest
#  daily 03:30   : refresh Riftbound cards from TCGplayer
[triggers]
crons = ["*/30 * * * *", "15 * * * *", "0 2 * * *", "30 3 * * *"]

# Fill the IDs below after running:
#   wrangler kv namespace create CARDS
#   wrangler kv namespace create WATCHLISTS
#   wrangler kv namespace create CONFIG
#   wrangler kv namespace create MMCACHE

[[kv_namespaces]]
binding = "CARDS"
id = "7529f407768b4f64ba2e04f8eccba413"

[[kv_namespaces]]
binding = "WATCHLISTS"
id = "ae5fe1b5ef704c36820b55eb3bd4a696"

[[kv_namespaces]]
binding = "CONFIG"
id = "451068c46611475e87594894cd310598"

[[kv_namespaces]]
binding = "MMCACHE"
id = "099991b5b7dc4b6a9b7072130dcad441"

# Secrets (set with `wrangler secret put NAME`):
#   DISCORD_PUBLIC_KEY     — Application → General Information → Public Key
#   DISCORD_TOKEN          — Application → Bot → Token (used by cron jobs to
#                            send messages and DMs; the request handler itself
#                            doesn't need the token, just the public key).
#   DISCORD_APPLICATION_ID — Application → General Information → Application ID
